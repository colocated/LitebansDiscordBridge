# LiteBansDiscordBridge Configuration
#
# Enabling/Disabling Events:
#   Each event type requires "enabled: true" to send notifications.
#   Set "enabled: false" or remove the enabled field to disable an event.
#   You can also comment out or delete the entire event section to disable it.
#
# To disable optional features (author, thumbnail, footer, etc.), comment out or delete those blocks.
# To remove a field, just delete that line from the fields list.
#
# YAML Multiline Support:
#   Use the pipe (|) symbol for multiline text that preserves line breaks:
#   description: |
#     Line 1
#     Line 2
#
# Discord Timestamp:
#   When enabled, shows the punishment date as a relative time in Discord
#   (e.g., "5 minutes ago") and makes it searchable. No need to add %date% to footer.
#
# Webhook URLs:
#   You can set a global webhook URL below, or override it for specific event types.
#   Event-specific webhook URLs are set in each event's configuration using "webhook-url: "..."
#   If an event-specific URL is not set or invalid, it will fall back to the global webhook URL.
#   All webhook URLs must be valid HTTPS URLs.
#
# Placeholders available for all messages:
#   %player% / %player_name% / %player_uuid% - The punished player
#   %executor% / %executor_name% / %executor_uuid% - Who issued the punishment
#   %reason% - The reason for the punishment
#   %type% - The type of punishment (ban, mute, warn, kick)
#   %duration% - How long the punishment lasts (time remaining)
#   %duration_original% - The original duration
#   %server% / %server_origin% - The server where the punishment was issued
#   %server_scope% - The scope of the punishment (Global or specific server)
#   %date% / %date_start% - When the punishment was issued
#   %date_end% - When the punishment expires
#   %ip% / %ip_address% - The IP address of the punished player
#   %id% - The punishment ID
#   %id_random% - The random punishment ID (e.g., 4AC6DA)
#   %active% - Whether the punishment is active (true/false)
#   %permanent% - Whether the punishment is permanent (true/false)
#   %silent% - Whether the punishment was silent (true/false)
#   %ipban% - Whether the punishment is an IP ban (true/false)
#   %removed_by_name% - Who removed the punishment (for unban/unmute events)
#   %removed_by_uuid% - UUID of who removed the punishment (for unban/unmute events)
#   %removed_reason% - Reason for removing the punishment (for unban/unmute events)

# Global Discord webhook URL - Get this from your Discord server settings
# This is used as the default for all events unless overridden in the event configuration
webhook-url: "https://discord.com/api/webhooks/YOUR_WEBHOOK_ID/YOUR_WEBHOOK_TOKEN"

# Event configurations - Delete or comment out entire event blocks to disable them
events:
  # Ban event - Set enabled to false or delete this section to disable ban notifications
  ban:
    enabled: true

    # Optional: Override the global webhook URL for this event only
    # webhook-url: "https://discord.com/api/webhooks/YOUR_BAN_WEBHOOK_ID/YOUR_BAN_WEBHOOK_TOKEN"

    # Optional content message (appears above embed) - Leave empty or delete this line if not needed
    content: ""
    embed:
      title: "Player Banned"
      # Description supports multiline with pipe (|) symbol - Preserves line breaks
      description: "**%player%** has been banned from the server."
      # Example of multiline description:
      # description: |
      #   **%player%** has been banned!
      #
      #   Duration: %duration%
      #   Reason: %reason%

      # URL for the embed title (optional) - Delete this line if not needed
      url: ""
      # Color in hex (#RRGGBB) or decimal
      color: "#FF0000"
      # Discord timestamp - Shows relative time ("5 minutes ago") and is searchable
      # Uses the punishment date automatically
      timestamp: true

      # Author section - Delete this entire block if you don't want an author
      author:
        name: "%executor%"
        url: ""
        icon-url: "https://api.mineatar.io/head/%executor_uuid%"

      # Thumbnail (small image on top right) - Delete this block to remove thumbnail
      thumbnail:
        url: "https://api.mineatar.io/head/%player_uuid%"

      # Large image - Uncomment and configure to add a large image
      # image:
      #   url: "https://example.com/image.png"

      # Footer - Delete this block to remove footer
      # Note: Timestamp is shown separately above the footer in Discord
      footer:
        text: "LiteBans"
        icon-url: ""

      # Fields (information rows) - Delete individual fields you don't want
      # Field values also support multiline with pipe (|) symbol
      fields:
        - name: "Player"
          value: "%player%"
          inline: true
        - name: "Banned by"
          value: "%executor%"
          inline: true
        - name: "Duration"
          value: "%duration%"
          inline: true
        - name: "Reason"
          value: "%reason%"
          inline: false
        # Example multiline field:
        # - name: "Details"
        #   value: |
        #     Reason: %reason%
        #     Duration: %duration%
        #     Server: %server_origin%
        #   inline: false
        - name: "Server"
          value: "%server_origin%"
          inline: true
        - name: "Scope"
          value: "%server_scope%"
          inline: true
        - name: "Punishment ID"
          value: "#%id%"
          inline: true

  # Mute event - Set enabled to false or delete this section to disable mute notifications
  mute:
    enabled: true

    # Optional: Override the global webhook URL for this event only
    # webhook-url: "https://discord.com/api/webhooks/YOUR_MUTE_WEBHOOK_ID/YOUR_MUTE_WEBHOOK_TOKEN"

    content: ""
    embed:
      title: "Player Muted"
      description: "**%player%** has been muted."
      url: ""
      color: "#FFA500"
      timestamp: true

      author:
        name: "%executor%"
        url: ""
        icon-url: "https://api.mineatar.io/head/%executor_uuid%"

      thumbnail:
        url: "https://api.mineatar.io/head/%player_uuid%"

      footer:
        text: "LiteBans"
        icon-url: ""

      fields:
        - name: "Player"
          value: "%player%"
          inline: true
        - name: "Muted by"
          value: "%executor%"
          inline: true
        - name: "Duration"
          value: "%duration%"
          inline: true
        - name: "Reason"
          value: "%reason%"
          inline: false
        - name: "Server"
          value: "%server_origin%"
          inline: true
        - name: "Scope"
          value: "%server_scope%"
          inline: true
        - name: "Punishment ID"
          value: "#%id%"
          inline: true

  # Warn event - Set enabled to false or delete this section to disable warn notifications
  warn:
    enabled: true

    # Optional: Override the global webhook URL for this event only
    # webhook-url: "https://discord.com/api/webhooks/YOUR_WARN_WEBHOOK_ID/YOUR_WARN_WEBHOOK_TOKEN"

    content: ""
    embed:
      title: "Player Warned"
      description: "**%player%** has been warned."
      url: ""
      color: "#FFFF00"
      timestamp: true

      author:
        name: "%executor%"
        url: ""
        icon-url: "https://api.mineatar.io/head/%executor_uuid%"

      thumbnail:
        url: "https://api.mineatar.io/head/%player_uuid%"

      footer:
        text: "LiteBans"
        icon-url: ""

      fields:
        - name: "Player"
          value: "%player%"
          inline: true
        - name: "Warned by"
          value: "%executor%"
          inline: true
        - name: "Reason"
          value: "%reason%"
          inline: false
        - name: "Server"
          value: "%server_origin%"
          inline: true
        - name: "Punishment ID"
          value: "#%id%"
          inline: true

  # Kick event - Set enabled to false or delete this section to disable kick notifications
  kick:
    enabled: true

    # Optional: Override the global webhook URL for this event only
    # webhook-url: "https://discord.com/api/webhooks/YOUR_KICK_WEBHOOK_ID/YOUR_KICK_WEBHOOK_TOKEN"

    content: ""
    embed:
      title: "Player Kicked"
      description: "**%player%** has been kicked from the server."
      url: ""
      color: "#FF6600"
      timestamp: true

      author:
        name: "%executor%"
        url: ""
        icon-url: "https://api.mineatar.io/head/%executor_uuid%"

      thumbnail:
        url: "https://api.mineatar.io/head/%player_uuid%"

      footer:
        text: "LiteBans"
        icon-url: ""

      fields:
        - name: "Player"
          value: "%player%"
          inline: true
        - name: "Kicked by"
          value: "%executor%"
          inline: true
        - name: "Reason"
          value: "%reason%"
          inline: false
        - name: "Server"
          value: "%server_origin%"
          inline: true
        - name: "Punishment ID"
          value: "#%id%"
          inline: true

  # Unban event - Set enabled to false or delete this section to disable unban notifications
  unban:
    enabled: true

    # Optional: Override the global webhook URL for this event only
    # webhook-url: "https://discord.com/api/webhooks/YOUR_UNBAN_WEBHOOK_ID/YOUR_UNBAN_WEBHOOK_TOKEN"

    content: ""
    embed:
      title: "Player Unbanned"
      description: "**%player%** has been unbanned."
      url: ""
      color: "#00FF00"
      timestamp: true

      author:
        name: "%removed_by_name%"
        url: ""
        icon-url: "https://api.mineatar.io/head/%removed_by_uuid%"

      thumbnail:
