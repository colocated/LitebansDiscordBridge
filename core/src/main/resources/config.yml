        icon-url: ""

      fields:
        - name: "Player"
          value: "%player%"
          inline: true
        - name: "Unbanned by"
          value: "%removed_by_name%"
          inline: true
        - name: "Removal Reason"
          value: "%removed_reason%"
          inline: false
        - name: "Original Ban Reason"
          value: "%reason%"
          inline: false
        - name: "Server"
          value: "%server_origin%"
          inline: true
        - name: "Scope"
          value: "%server_scope%"
          inline: true
        - name: "Punishment ID"
          value: "#%id%"
